name: Upload release to Nexus Mods

# Auto-runs when a (non-prerelease) GitHub release is published, pushing its
# portable .exe as a NEW VERSION of the existing file on the HZMM Nexus page
# (https://www.nexusmods.com/humanitz/mods/82) via the official Nexus Upload
# API (open beta). Can also be run manually for any tag from the Actions tab.
#
# One-time setup: add a repository secret named NEXUSMODS_API_KEY
#   (Settings > Secrets and variables > Actions > New repository secret).
#   Generate the key at https://www.nexusmods.com/settings/api-keys
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload (e.g. v1.5.0)"
        required: true
        default: v1.5.0

jobs:
  upload:
    runs-on: ubuntu-latest
    # Skip auto-upload for pre-releases; manual runs always proceed.
    if: ${{ github.event_name == 'workflow_dispatch' || !github.event.release.prerelease }}
    permissions:
      contents: read
    steps:
      - name: Resolve release tag and Nexus version
        id: tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          TAG="${RELEASE_TAG:-$DISPATCH_TAG}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download the release .exe
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release download "${{ steps.tag.outputs.tag }}"
          --repo "${{ github.repository }}"
          --pattern '*.exe'
          --output "HZMM Manager.exe"

      - name: Upload new version to Nexus (file_id 7246205)
        uses: Nexus-Mods/upload-action@v1.0.0-beta.8
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_id: 7246205
          filename: HZMM Manager.exe
          version: ${{ steps.tag.outputs.version }}
          display_name: HZMM Manager ${{ steps.tag.outputs.tag }}
          # Auto-fills the Nexus version description from the GitHub release
          # notes (empty on manual runs — add notes on Nexus if you want).
          description: ${{ github.event.release.body }}
          category: main
          archive_existing_version: false
