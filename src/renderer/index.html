<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https:;" />
    <title>HZMM Manager</title>
    <style>
      #splash-screen {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #020617;
        -webkit-app-region: drag;
        transition: opacity 0.5s ease, transform 0.5s ease, filter 0.5s ease;
      }
      #splash-screen.exit {
        opacity: 0; transform: scale(1.04); filter: blur(6px);
        pointer-events: none;
      }
      #splash-orb-1 {
        position: absolute; top: 50%; left: 50%; width: 50vw; height: 50vw;
        transform: translate(-50%, -50%);
        border-radius: 50%; filter: blur(140px);
        background: rgba(249, 115, 22, 0.12);
        animation: sOrbFloat 20s ease-in-out infinite;
      }
      #splash-orb-2 {
        position: absolute; top: 30%; left: 25%; width: 25vw; height: 25vw;
        border-radius: 50%; filter: blur(100px);
        background: rgba(232, 121, 249, 0.1);
        animation: sOrbFloat2 25s ease-in-out infinite;
      }
      #splash-logo {
        width: 108px; height: 108px;
        background: url('./src/assets/icon.png') center/contain no-repeat;
        border-radius: 50%;
        opacity: 0; transform: scale(0.6); filter: blur(8px);
        animation: sLogoIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards,
                   sLogoPulse 2.5s ease-in-out 0.8s infinite;
      }
      #splash-title {
        margin-top: 24px;
        font: 900 36px/1 system-ui, -apple-system, sans-serif;
        letter-spacing: 0.3em;
        background: linear-gradient(to right, #f97316, #dc2626);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
        opacity: 0; transform: translateY(12px);
        animation: sTextIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
      }
      #splash-bar-track {
        margin-top: 36px; width: 120px; height: 2px;
        border-radius: 1px; background: rgba(255,255,255,0.06);
        overflow: hidden;
      }
      #splash-bar {
        width: 100%; height: 100%; border-radius: 1px;
        background: linear-gradient(to right, #f97316, #dc2626);
        transform-origin: center;
        animation: sBarPulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes sLogoIn {
        to { opacity: 1; transform: scale(1); filter: blur(0); }
      }
      @keyframes sLogoPulse {
        0%, 100% { box-shadow: 0 0 30px rgba(249,115,22,0.25), 0 0 60px rgba(249,115,22,0.08); transform: scale(1); }
        50% { box-shadow: 0 0 50px rgba(249,115,22,0.4), 0 0 100px rgba(249,115,22,0.15); transform: scale(1.05); }
      }
      @keyframes sTextIn {
        from { opacity: 0; transform: translateY(12px); letter-spacing: 0.5em; }
        to { opacity: 1; transform: translateY(0); letter-spacing: 0.3em; }
      }
      @keyframes sBarPulse {
        0%, 100% { opacity: 0.4; transform: scaleX(0.3); }
        50% { opacity: 1; transform: scaleX(1); }
      }
      @keyframes sOrbFloat {
        0%, 100% { transform: translate(-50%, -50%) scale(1); }
        50% { transform: translate(-45%, -55%) scale(1.1); }
      }
      @keyframes sOrbFloat2 {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.15) translateX(3vw); }
      }
    </style>
  </head>
  <body>
    <div id="splash-screen">
      <div id="splash-orb-1"></div>
      <div id="splash-orb-2"></div>
      <div id="splash-logo"></div>
      <div id="splash-title">HZMM</div>
      <div id="splash-bar-track"><div id="splash-bar"></div></div>
    </div>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
